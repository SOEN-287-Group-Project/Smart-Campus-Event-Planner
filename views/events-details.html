<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Details</title>

    <link rel="stylesheet" href="../public/css/main.css">
</head>

<body>
    <main class="event-details-page">
        <section class="event-details-card">
            <div class="event-image">
                <span>Campus Event</span>
            </div>

            <div class="event-information">
                <p class="event-category">Student Activity</p>

                <h1> (event name)</h1>

                <p class="event-description">
                    (event description)
                </p>

                <div class="event-facts">
                    <div class="event-fact">
                        <strong>Date</strong>
                        <span> (date) </span>
                    </div>

                    <div class="event-fact">
                        <strong>Time</strong>
                        <span> (time) </span>
                    </div>

                    <div class="event-fact">
                        <strong>Location</strong>
                        <span> (location) </span>
                    </div>

                    <div class="event-fact">
                        <strong>Available Spaces</strong>
                        <span> (spaces remaining) </span>
                    </div>
                </div>

                <div class="event-actions">
                    <button type="button">Register for Event</button>
                    <a href="events.html">Back to Events</a>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
