<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="../public/css/main.css" />
    <link rel="stylesheet" href="../public/css/global_styles.css" />
    <script src="../controllers/adminController.js"></script>
</head>

<body>
    
    <header><!--navigation bar-->
        <div class="topbar">
            <h1>Smart Event Planner</h1>
            <h2>Admin Dashboard</h2>
            <nav class = "nav-links">
                <a class="active-page" href="Admin-dashboard.html" target="_self">Overview</a>
                <a href="manage-events.html"  target="_self">Manage Events</a>
                <a href="create-event.html" target="_self">Create Event</a>
                <a href="analytics.html" target="_self">Analytics</a>
                
                
                <div class="user-menu">

                    <button id="menuButton" class="menu-button">
                        <span class="arrow">▲</span>
                        <script>rotateMenuArrow()</script>
                    </button>
                   
                    <div id="dropdown" class="dropdown hidden">
                        <a id="menu-items" href="index.html">Logout</a> <!-- Add more menu items here if needed -->
                    </div>

                </div>
                <script>toggleDropdown();</script>                
            </nav>
        </div>
    </header>

    <section class="overview-grid">
        <div class="panel overview-title">

            <h1>Overview</h1>

            <div class="stats-grid">
                <div class="stat-card">
                    <span>Total Events</span>
                    <strong>128</strong>
                </div>

                <div class="stat-card">
                    <span>Upcoming Events</span>
                    <strong>24</strong>
                </div>

                <div class="stat-card">
                    <span>Registrations</span>
                    <strong>3,482</strong>
                </div>
            </div>

        </div>

        <div class="panel overview-title">

            <h1>Top Events</h1>

            <div class="stats-grid">
                <table class="stat-card">
                    <tbody>
                        <tr>
                            <td>Spring Tech Summit</td>
                            <td><strong>185</strong></td>
                        </tr>
                        <tr>
                            <td>Volunteer Fair</td>
                            <td><strong>143</strong></td>
                        </tr>
                        <tr>
                            <td>Campus Networking Night</td>
                            <td><strong>92</strong></td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </div>

        <div></div>

        <div class = "panel calendar">
            <div class="cal-header">
                <button id="prevBtn">
                    <h2>‹</h2>
                </button>
                <div class="monthYear" id="monthYear"></div>
                <button id="nextBtn">
                    <h2>›</h2>
                </button>
            </div>
            <div class="days">
                <div class="day">Mon</div>
                <div class="day">Tue</div>
                <div class="day">Wed</div>
                <div class="day">Thu</div>
                <div class="day">Fri</div>
                <div class="day">Sat</div>
                <div class="day">Sun</div>
            </div>
            <div class="dates" id="dates"></div>
        </div>   

        <script>renderCalendar()</script>


    </section>

</body>
